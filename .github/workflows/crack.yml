name: Crack with Hashcat and John

on:
  workflow_dispatch:
    inputs:
      hash_type:
        description: 'Hashcat 模式 (-m)'
        required: false
        default: '1000'
      extra_args:
        description: 'Hashcat 额外参数'
        required: false
        default: '-O --force'

jobs:
  crack:
    runs-on: windows-latest
    timeout-minutes: 360   # 6小时，可调整

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 下载 Hashcat
      - name: Download Hashcat Windows binary
        run: |
          curl -L -o hashcat.7z "https://github.com/rzhy1/hashcat/releases/download/v7.1.2-382-g2d71af371/hashcat_v7.1.2-382-g2d71af371.7z"
          mkdir hashcat_dir
          7z x hashcat.7z -ohashcat_dir
        shell: pwsh

      # 下载 John the Ripper
      - name: Download John the Ripper Windows binary
        run: |
          curl -L -o john.zip "https://github.com/rzhy1/john-windows-x64/releases/download/1.9.0-jumbo-1%2Bbleeding-f514ece8ec/john-windows-x64.zip"
          mkdir john_dir
          Expand-Archive -Path john.zip -DestinationPath john_dir
        shell: pwsh

      # 将工具路径添加到 PATH
      - name: Add tools to PATH
        run: |
          $hashcatPath = "$env:GITHUB_WORKSPACE\hashcat_dir"
          $johnPath = "$env:GITHUB_WORKSPACE\john_dir\john-*"  # 通用匹配
          # 找到具体的 john.exe 所在目录（解压后可能是 john-1.9.0-jumbo-1... 文件夹）
          $johnExeDir = Get-ChildItem -Path $env:GITHUB_WORKSPACE\john_dir -Directory | Select-Object -First 1
          if ($johnExeDir) {
            $env:PATH = "$hashcatPath;$($johnExeDir.FullName);$env:PATH"
            echo "JOHN_DIR=$($johnExeDir.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            $env:PATH = "$hashcatPath;$env:GITHUB_WORKSPACE\john_dir;$env:PATH"
          }
          $env:PATH = "$hashcatPath;$env:PATH"
          echo "HASHCAT_DIR=$hashcatPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "PATH=$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        shell: pwsh

      # 验证工具是否可用（可选）
      - name: Verify tools
        run: |
          hashcat --version
          john --list=formats | Select-Object -First 5
        shell: pwsh
        continue-on-error: true   # 如果验证失败也不中断，避免影响后续脚本

      # 执行用户提供的批处理脚本（crack.bat）
      - name: Run crack script
        run: |
          if (Test-Path "crack.bat") {
            .\crack.bat
          } else {
            Write-Host "未找到 crack.bat，使用默认命令（仅 hashcat 字典攻击）..."
            hashcat -m ${{ github.event.inputs.hash_type }} -a 0 hash.txt xxx.txt -o result.txt ${{ github.event.inputs.extra_args }}
          }
        shell: pwsh

      # 上传结果文件
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: crack-results
          path: |
            result.txt
            hashcat.potfile
            *.pot
            *.pot.*
          if-no-files-found: ignore
