name: Crack with John and Hashcat

on:
  workflow_dispatch:

jobs:
  crack:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Check hardware info
        run: |
          Write-Host "=== CPU 信息 ==="
          Get-CimInstance -ClassName Win32_Processor | Select-Object Name, NumberOfCores, NumberOfLogicalProcessors, MaxClockSpeed
          
          Write-Host "`n=== 内存信息 ==="
          Get-CimInstance -ClassName Win32_PhysicalMemory | Measure-Object -Property Capacity -Sum | ForEach-Object {
              Write-Host "总内存: $([math]::Round($_.Sum / 1GB, 2)) GB"
          }
          
          Write-Host "`n=== GPU 信息 ==="
          Get-CimInstance -ClassName Win32_VideoController | Where-Object { $_.Name -notlike "*Remote*" } | Select-Object Name, DriverVersion, CurrentHorizontalResolution, CurrentVerticalResolution
          
          Write-Host "`n=== 操作系统 ==="
          Get-CimInstance -ClassName Win32_OperatingSystem | Select-Object Caption, Version, OSArchitecture
        shell: pwsh
      - name: Download Hashcat
        run: |
          curl -L -o hashcat.7z "https://github.com/rzhy1/hashcat/releases/download/v7.1.2-382-g2d71af371/hashcat_v7.1.2-382-g2d71af371.7z"
          mkdir hashcat_dir
          7z x hashcat.7z -ohashcat_dir
          echo "HASHCAT_DIR=$env:GITHUB_WORKSPACE\hashcat_dir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        shell: pwsh

      - name: Download John the Ripper
        run: |
          curl -L -o john.zip "https://github.com/rzhy1/john-windows-x64/releases/download/1.9.0-jumbo-1%2Bbleeding-f514ece8ec/john-windows-x64.zip"
          mkdir john_dir
          Expand-Archive -Path john.zip -DestinationPath john_dir
          $johnRoot = Get-ChildItem -Path "john_dir" -Directory | Select-Object -First 1
          $johnRunDir = "$($johnRoot.FullName)\run"
          echo "JOHN_DIR=$johnRunDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "$johnRunDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Verify tools (CPU mode only)
        run: |
          Write-Host "=== Hashcat 版本 ==="
          & "$env:HASHCAT_DIR\hashcat.exe" --version
          
          Write-Host "`n=== John 版本 ==="
          & "$env:JOHN_DIR\john.exe"  --list=devices
          
          Write-Host "`n=== John CPU 测试 ==="
          & "$env:JOHN_DIR\john.exe" --test --format=zip
        shell: pwsh

      - name: Run crack script
        run: |
          if (Test-Path "crack.bat") {
            .\crack.bat
          } else {
            Write-Host "使用默认 John 命令..."
            & "$env:JOHN_DIR\john.exe" --format=${{ github.event.inputs.hash_format }} --wordlist=xxx.txt hash.txt --pot=john.pot
            & "$env:JOHN_DIR\john.exe" --show hash.txt
          }
        shell: pwsh

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: crack-results
          path: |
            *.pot
            result.txt
          if-no-files-found: ignore
